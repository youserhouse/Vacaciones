<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Vacaciones 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent: #f5a623;
    --festivo: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
    flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .tabs { display: flex; gap: 3px; background: var(--bg); border-radius: 10px; padding: 4px; }
  .tab-btn {
    padding: 7px 16px; border: none; background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    border-radius: 7px; cursor: pointer; transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #000; font-weight: 700; }

  .btn {
    padding: 9px 16px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-accent:hover { filter: brightness(1.1); }
  .btn-ghost { background: var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-pdf { background: #2d6a4f; color: #fff; border: 1px solid #40916c; }
  .btn-pdf:hover { background: #40916c; }

  main { padding: 24px 28px; max-width: 1600px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* Stats */
  .stats-bar { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; min-width: 140px; flex: 1;
  }
  .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px; }
  .stat-card .value { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; }
  .stat-card .sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .stat-card.festivo-card { border-color: rgba(255,107,107,.3); }
  .stat-card.festivo-card .value { color: var(--festivo); }

  .section-title {
    font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
    margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
  }

  /* Employee cards */
  .employees-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; margin-bottom: 24px; }
  .emp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; transition: border-color .2s;
  }
  .emp-card:hover { border-color: rgba(245,166,35,.5); }
  .emp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .emp-dot {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 800;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  .emp-name { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .emp-role { font-size: 0.72rem; color: var(--muted); }
  .progress-wrap { margin-bottom: 8px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.73rem; color: var(--muted); margin-bottom: 4px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .days-taken { font-size: 0.76rem; color: var(--muted); }
  .days-taken strong { color: var(--text); }
  .emp-card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .btn-edit {
    flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-edit:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-delete {
    padding: 8px 12px; border: 1px solid rgba(255,68,68,.2); border-radius: 8px;
    background: rgba(255,68,68,.08); color: #ff6666; font-size: 0.78rem; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-delete:hover { background: #ff4444; color: #fff; border-color: #ff4444; }

  /* Festivos panel */
  .festivos-panel {
    background: var(--surface); border: 1px solid rgba(255,107,107,.35);
    border-radius: 14px; padding: 18px; margin-bottom: 22px;
  }
  .festivos-panel .section-title { color: var(--festivo); }
  .festivos-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .festivo-chip {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,107,107,.12); border: 1px solid rgba(255,107,107,.35);
    border-radius: 8px; padding: 5px 10px; font-size: 0.78rem; font-weight: 600;
  }
  .festivo-chip button {
    background: none; border: none; color: var(--festivo); cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0; opacity: .7; transition: opacity .2s;
  }
  .festivo-chip button:hover { opacity: 1; }
  .no-festivos { color: var(--muted); font-size: 0.8rem; font-style: italic; }

  /* Annual */
  .year-nav { display: flex; align-items: center; gap: 14px; }
  .year-nav h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
  .year-nav button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 34px; height: 34px; border-radius: 8px; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
  }
  .year-nav button:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  .filter-pills { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill {
    padding: 4px 13px; border-radius: 99px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; border: 2px solid transparent; transition: all .2s; opacity: 0.5;
  }
  .pill.active { opacity: 1; }
  .pill-all { background: var(--surface2); color: var(--text); border-color: var(--border) !important; opacity: 1; }
  .pill-all.active { border-color: var(--accent) !important; }
  .pill-festivo { background: rgba(255,107,107,.15); color: var(--festivo); border-color: rgba(255,107,107,.3) !important; }
  .pill-festivo.active { opacity: 1; border-color: var(--festivo) !important; }

  .annual-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  @media(max-width:900px){ .annual-grid { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:600px){ .annual-grid { grid-template-columns: 1fr; } }

  .month-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .month-name {
    font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 9px; color: var(--muted);
  }
  .month-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .day-header { text-align: center; font-size: 0.6rem; color: var(--muted); padding: 2px 0; font-weight: 600; text-transform: uppercase; }
  .day-cell {
    aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 0.63rem; font-weight: 500; cursor: pointer; position: relative;
    transition: transform .1s; user-select: none;
  }
  .day-cell:hover { transform: scale(1.18); z-index: 2; }
  .day-cell.empty { pointer-events: none; }
  .day-cell.weekend { color: var(--muted); }
  .day-cell.today { outline: 2px solid var(--accent); outline-offset: 1px; }
  .day-cell.marked { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .day-cell.is-festivo {
    background: rgba(255,107,107,.15) !important;
    outline: 1px solid rgba(255,107,107,.4);
  }
  .day-cell.is-festivo.marked {
    outline: 1px solid rgba(255,107,107,.6);
  }
  .festivo-corner {
    position: absolute; top: 1px; right: 1px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--festivo);
  }
  .day-dots { position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%); display: flex; gap: 1.5px; }
  .day-dot { width: 3px; height: 3px; border-radius: 50%; }

  /* Monthly */
  .month-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .month-selector select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; outline: none;
  }
  .monthly-calendar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .monthly-header { display: grid; grid-template-columns: repeat(7,1fr); background: var(--surface2); border-bottom: 1px solid var(--border); }
  .monthly-header div { padding: 11px; text-align: center; font-size: 0.73rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .monthly-grid { display: grid; grid-template-columns: repeat(7,1fr); }
  .monthly-day {
    min-height: 88px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 7px; position: relative; cursor: pointer; transition: background .15s;
  }
  .monthly-day:hover { background: var(--surface2); }
  .monthly-day.empty { cursor: default; background: rgba(0,0,0,.12); }
  .monthly-day.weekend .day-num { color: var(--muted); }
  .monthly-day.today .day-num {
    background: var(--accent); color: #000; width: 22px; height: 22px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .monthly-day.is-festivo { background: rgba(255,107,107,.06); border-left: 2px solid rgba(255,107,107,.4); }
  .monthly-day.is-festivo:hover { background: rgba(255,107,107,.12); }
  .festivo-label {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(255,107,107,.2); border: 1px solid rgba(255,107,107,.4);
    border-radius: 4px; padding: 1px 5px; font-size: 0.62rem; font-weight: 700; color: var(--festivo);
    margin-bottom: 3px;
  }
  .day-num { font-size: 0.78rem; font-weight: 600; margin-bottom: 3px; }
  .day-emp-badges { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 1px; }
  .emp-badge {
    padding: 1px 5px; border-radius: 4px; font-size: 0.63rem; font-weight: 700;
    color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,.3);
  }

  /* Legend */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.73rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-festivo {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
    background: rgba(255,107,107,.3); border: 1px solid rgba(255,107,107,.6);
  }

  /* Modals */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.78); backdrop-filter: blur(4px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
    padding: 26px; width: 430px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform .25s;
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; margin-bottom: 18px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 10px 13px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color .2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .color-picker-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 5px; }
  .color-opt { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all .2s; }
  .color-opt.selected { border-color: #fff; transform: scale(1.15); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Day modal festivo section */
  .day-festivo-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: rgba(255,107,107,.1);
    border: 1px solid rgba(255,107,107,.35); border-radius: 10px; margin-bottom: 16px;
    cursor: pointer; transition: all .2s;
  }
  .day-festivo-toggle:hover { background: rgba(255,107,107,.18); }
  .day-festivo-toggle.active { background: rgba(255,107,107,.22); border-color: var(--festivo); }
  .day-festivo-toggle input[type=checkbox] { accent-color: var(--festivo); width: 16px; height: 16px; }
  .day-festivo-label { font-size: 0.88rem; font-weight: 700; color: var(--festivo); }
  .day-festivo-sub { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
  .day-section-label { font-size: 0.73rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 8px; }

  .day-modal-emps { display: flex; flex-direction: column; gap: 7px; }
  .day-emp-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 13px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; transition: border-color .2s;
  }
  .day-emp-row:hover { border-color: var(--accent); }
  .day-emp-row.selected { border-color: rgba(255,255,255,.3); background: var(--surface2); }
  .day-emp-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }
  .emp-dot-sm { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .day-emp-type {
    margin-left: auto; background: var(--border); border: none; color: var(--text);
    padding: 3px 9px; border-radius: 6px; font-size: 0.72rem; cursor: pointer; outline: none;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #000;
    padding: 11px 18px; border-radius: 10px; font-weight: 700; font-size: 0.83rem;
    z-index: 9999; transform: translateY(70px); opacity: 0; transition: all .3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>🗓 Control de <span>Vacaciones</span></h1>
  <div class="header-right">
    <div class="tabs">
      <button class="tab-btn active" onclick="showView('dashboard')">Resumen</button>
      <button class="tab-btn" onclick="showView('annual')">Anual</button>
      <button class="tab-btn" onclick="showView('monthly')">Mensual</button>
    </div>
    <button class="btn btn-accent" onclick="openAddEmployee()">+ Empleado</button>
  </div>
</header>

<main>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="festivos-panel">
      <div class="section-title">🎌 Festivos marcados este año</div>
      <div class="festivos-list" id="festivos-list"></div>
    </div>
    <div class="section-title">Empleados</div>
    <div class="employees-grid" id="employees-grid"></div>
  </div>

  <!-- ANNUAL -->
  <div class="view" id="view-annual">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px;">
      <div class="year-nav">
        <button onclick="changeYear(-1)">‹</button>
        <h2 id="year-label">2026</h2>
        <button onclick="changeYear(1)">›</button>
      </div>
      <div class="filter-pills" id="filter-pills"></div>
      <button class="btn btn-pdf" onclick="openPdfModal()">⬇ Exportar PDF</button>
    </div>
    <div class="legend" id="annual-legend"></div>
    <div class="annual-grid" id="annual-grid"></div>
  </div>

  <!-- MONTHLY -->
  <div class="view" id="view-monthly">
    <div class="month-selector">
      <select id="month-select" onchange="renderMonthly()"></select>
      <select id="year-select-monthly" onchange="renderMonthly()"></select>
    </div>
    <div class="legend" id="monthly-legend"></div>
    <div class="monthly-calendar" id="monthly-calendar"></div>
  </div>

</main>

<!-- PDF Export Modal -->
<div class="overlay" id="pdf-modal">
  <div class="modal">
    <h3>⬇ Exportar PDF</h3>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:18px;">Genera un calendario anual con los días de vacaciones resaltados.</p>
    <div class="form-group">
      <label>Empleado</label>
      <select id="pdf-emp-select">
        <option value="all">— Todos los empleados —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Año</label>
      <select id="pdf-year-select"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('pdf-modal')">Cancelar</button>
      <button class="btn btn-pdf" onclick="generatePDF()" id="pdf-generate-btn">Generar PDF</button>
    </div>
  </div>
</div>

<!-- Employee Modal -->
<div class="overlay" id="emp-modal">
  <div class="modal">
    <h3 id="emp-modal-title">Nuevo Empleado</h3>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="emp-name" placeholder="Ej: María García">
    </div>
    <div class="form-group">
      <label>Cargo / Rol</label>
      <input type="text" id="emp-role" placeholder="Ej: Comercial">
    </div>
    <div class="form-group">
      <label>Días de vacaciones anuales</label>
      <input type="number" id="emp-days" value="28" min="1" max="60">
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-picker-row" id="color-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('emp-modal')">Cancelar</button>
      <button class="btn btn-accent" onclick="saveEmployee()">Guardar</button>
    </div>
  </div>
</div>

<!-- Day Modal -->
<div class="overlay" id="day-modal">
  <div class="modal">
    <h3 id="day-modal-title">Marcar día</h3>

    <div class="day-festivo-toggle" id="festivo-toggle" onclick="toggleFestivo()">
      <input type="checkbox" id="chk-festivo" onclick="event.stopPropagation();toggleFestivo()">
      <span class="day-festivo-label">🎌 Día Festivo</span>
      <span class="day-festivo-sub">No cuenta en vacaciones</span>
    </div>

    <div class="day-section-label">Empleados de vacaciones</div>
    <div class="day-modal-emps" id="day-modal-emps"></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('day-modal')">Cancelar</button>
      <button class="btn btn-accent" onclick="saveDayMarks()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e8c','#00bcd4','#ff6b35','#607d8b','#795548'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_SHORT = ['L','M','X','J','V','S','D'];

const DEFAULT_EMPLOYEES = [
  { id: 1, name: 'Ana',    role: 'Flotante', color: '#e74c3c', totalDays: 28 },
  { id: 2, name: 'Sara',   role: 'Flotante', color: '#3498db', totalDays: 28 },
  { id: 3, name: 'Samuel', role: 'Flotante', color: '#2ecc71', totalDays: 28 },
  { id: 4, name: 'José',   role: 'Flotante', color: '#f39c12', totalDays: 28 },
  { id: 5, name: 'Dani',   role: 'Flotante', color: '#9b59b6', totalDays: 28 },
];

let state = loadState();

function loadState() {
  // Try current save
  try {
    const s = localStorage.getItem('vac-app-v3');
    if (s) {
      const p = JSON.parse(s);
      migrateFestivoEmployee(p);
      if (!p.festivos) p.festivos = {};
      return p;
    }
  } catch(e) {}
  // Try migrating from old v2 save
  try {
    const old = localStorage.getItem('vac-app-v2');
    if (old) {
      const p = JSON.parse(old);
      if (!p.festivos) p.festivos = {};
      migrateFestivoEmployee(p);
      return p;
    }
  } catch(e) {}
  return {
    employees: DEFAULT_EMPLOYEES,
    nextId: 6,
    marks: {},
    festivos: {},
    currentYear: 2026,
    selectedColor: COLORS[0],
    activeFilters: ['all'],
  };
}

// Finds any employee named "Festivo" and converts their days to real festivos
function migrateFestivoEmployee(parsed) {
  if (!parsed.festivos) parsed.festivos = {};
  if (!parsed.employees) return;
  const festEmp = parsed.employees.find(e => e.name.toLowerCase() === 'festivo');
  if (!festEmp) return;
  if (parsed.marks) {
    for (const [key, dayMarks] of Object.entries(parsed.marks)) {
      if (dayMarks[festEmp.id] !== undefined) {
        parsed.festivos[key] = true;
        delete dayMarks[festEmp.id];
        if (!Object.keys(dayMarks).length) delete parsed.marks[key];
      }
    }
  }
  parsed.employees = parsed.employees.filter(e => e.id !== festEmp.id);
}

function saveState() {
  localStorage.setItem('vac-app-v3', JSON.stringify(state));
}

// ── UTILS ─────────────────────────────────────────────────────
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function firstDayOfMonth(y,m){ const d=new Date(y,m,1).getDay(); return d===0?6:d-1; }
function isWeekend(y,m,d){ const w=new Date(y,m,d).getDay(); return w===0||w===6; }
function todayKey(){ const t=new Date(); return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`; }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function initials(name){ return name.slice(0,2).toUpperCase(); }
function getDayMarks(key){ return state.marks[key]||{}; }
function isFestivo(key){ return !!state.festivos[key]; }

// Only count days marked as Vacaciones "V" (not Otros "O")
function countVacDays(empId, year) {
  let count = 0;
  for (const [k,v] of Object.entries(state.marks)) {
    if (k.startsWith(String(year)) && v[empId]==='V') count++;
  }
  return count;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── VIEWS ─────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const idx=['dashboard','annual','monthly'].indexOf(v);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if(v==='dashboard') renderDashboard();
  if(v==='annual') renderAnnual();
  if(v==='monthly') renderMonthly();
}

// ── DASHBOARD ─────────────────────────────────────────────────

  const totalVac = emps.reduce((a,e)=>a+countVacDays(e.id,y),0);
  const totalLeft = emps.reduce((a,e)=>a+(e.totalDays-countVacDays(e.id,y)),0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="label">Año</div>
      <div class="value" style="color:var(--accent)">${y}</div>
      <div class="sub">en curso</div>
    </div>
    <div class="stat-card">
      <div class="label">Empleados</div>
      <div class="value">${emps.length}</div>
      <div class="sub">registrados</div>
    </div>
    <div class="stat-card">
      <div class="label">Días usados</div>
      <div class="value">${totalVac}</div>
      <div class="sub">vacaciones asignadas</div>
    </div>
    <div class="stat-card">
      <div class="label">Días restantes</div>
      <div class="value">${totalLeft}</div>
      <div class="sub">entre todos</div>
    </div>
    <div class="stat-card festivo-card">
      <div class="label">Festivos</div>
      <div class="value">${festivosYear.length}</div>
      <div class="sub">marcados este año</div>
    </div>`;

  // Festivos list
  const festList = document.getElementById('festivos-list');
  if (!festivosYear.length) {
    festList.innerHTML = '<span class="no-festivos">Sin festivos marcados. Ábrelos desde el calendario.</span>';
  } else {
    festList.innerHTML = festivosYear.sort().map(key => {
      const p=key.split('-');
      const label=`${parseInt(p[2])} ${MONTHS[parseInt(p[1])-1].slice(0,3)} ${p[0]}`;
      return `<div class="festivo-chip">🎌 ${label}<button onclick="removeFestivo('${key}')" title="Eliminar">×</button></div>`;
    }).join('');
  }

  // Employee cards
  document.getElementById('employees-grid').innerHTML = emps.map(emp => {
    const used=countVacDays(emp.id,y);
    const pct=Math.min(100,Math.round((used/emp.totalDays)*100));
    return `
    <div class="emp-card" style="border-left:4px solid ${emp.color}">
      <div class="emp-header">
        <div class="emp-dot" style="background:${emp.color}">${initials(emp.name)}</div>
        <div><div class="emp-name">${emp.name}</div><div class="emp-role">${emp.role||'—'}</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Vacaciones usadas</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${emp.color}"></div></div>
      </div>
      <div class="days-taken">
        <strong>${used}</strong> de <strong>${emp.totalDays}</strong> días usados
        · <strong style="color:${emp.color}">${emp.totalDays-used}</strong> restantes
      </div>
      <div class="emp-card-actions">
        <button class="btn-edit" onclick="openEditEmployee(${emp.id})">✏️ Editar empleado</button>
        <button class="btn-delete" onclick="deleteEmployee(${emp.id})" title="Eliminar">🗑</button>
      </div>
    </div>`;
  }).join('') + `
  <div class="emp-card" style="border:2px dashed var(--border);background:transparent;display:flex;align-items:center;justify-content:center;min-height:130px;cursor:pointer;" onclick="openAddEmployee()">
    <div style="text-align:center;color:var(--muted)">
      <div style="font-size:1.8rem;margin-bottom:5px">+</div>
      <div style="font-size:0.83rem">Añadir empleado</div>

function removeFestivo(key) {
  delete state.festivos[key];
  saveState();
  renderDashboard();
  showToast('🗑 Festivo eliminado');
}

// ── ANNUAL ────────────────────────────────────────────────────
function renderAnnual() {
  const y = state.currentYear;
  document.getElementById('year-label').textContent = y;
  renderFilterPills();
  renderLegend('annual-legend');
  const grid = document.getElementById('annual-grid');
  grid.innerHTML = '';

  for (let m=0; m<12; m++) {
    const block = document.createElement('div');
    block.className = 'month-block';
    const days=daysInMonth(y,m), first=firstDayOfMonth(y,m);
    let html = `<div class="month-name">${MONTHS[m]}</div><div class="month-days">`;
    DAYS_SHORT.forEach(d=>html+=`<div class="day-header">${d}</div>`);
    for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;

    for(let d=1;d<=days;d++){
      const key=dateKey(y,m,d);
      const marks=getDayMarks(key);
      const festivo=isFestivo(key);
      const showFestivo = festivo && (state.activeFilters.includes('all')||state.activeFilters.includes('festivo'));
      const markedEmps=Object.keys(marks).map(Number).filter(id=>{
        if(state.activeFilters.includes('all')) return true;
        return state.activeFilters.includes(id);
      });
      const weekend=isWeekend(y,m,d), isToday=key===todayKey();
      let bg='transparent', cls='day-cell';
      if(weekend) cls+=' weekend';
      if(isToday) cls+=' today';
      if(showFestivo) cls+=' is-festivo';
      let dotsHtml='';
      if(markedEmps.length===1){
        const emp=state.employees.find(e=>e.id===markedEmps[0]);
        if(emp){ bg=emp.color; cls+=' marked'; }
      } else if(markedEmps.length>1){
        cls+=' multi-marked';
        dotsHtml=`<div class="day-dots">${markedEmps.slice(0,4).map(id=>{
          const emp=state.employees.find(e=>e.id===id);
          return emp?`<div class="day-dot" style="background:${emp.color}"></div>`:'';
        }).join('')}</div>`;
      }
      const fCorner=showFestivo?`<div class="festivo-corner"></div>`:'';
      html+=`<div class="${cls}" style="background:${bg}" onclick="openDayModal('${key}')">${d}${dotsHtml}${fCorner}</div>`;
    }
    html+='</div>';
    block.innerHTML=html;
    grid.appendChild(block);
  }
}

function renderFilterPills() {
  const af=state.activeFilters;
  let html=`<div class="pill pill-all ${af.includes('all')?'active':''}" onclick="toggleFilter('all')">Todos</div>`;
  html+=`<div class="pill pill-festivo ${af.includes('festivo')?'active':''}" onclick="toggleFilter('festivo')">🎌 Festivos</div>`;
  state.employees.forEach(e=>{
    html+=`<div class="pill ${af.includes(e.id)?'active':''}" style="background:${e.color}20;color:${e.color};border-color:${e.color}40" onclick="toggleFilter(${e.id})">${e.name}</div>`;
  });
  document.getElementById('filter-pills').innerHTML=html;
}

function toggleFilter(id) {
  if(id==='all'){ state.activeFilters=['all']; }
  else {
    state.activeFilters=state.activeFilters.filter(x=>x!=='all');
    if(state.activeFilters.includes(id)) {
      state.activeFilters=state.activeFilters.filter(x=>x!==id);
      if(!state.activeFilters.length) state.activeFilters=['all'];
    } else { state.activeFilters.push(id); }
  }
  renderAnnual();
}

function changeYear(delta) {
  state.currentYear+=delta; saveState(); renderAnnual();
}

// ── MONTHLY ───────────────────────────────────────────────────
function initMonthlySelects() {
  const ms=document.getElementById('month-select'), ys=document.getElementById('year-select-monthly');
  if(!ms.options.length){
    MONTHS.forEach((m,i)=>ms.add(new Option(m,i)));
    for(let y=2024;y<=2030;y++) ys.add(new Option(y,y));
    ms.value=new Date().getMonth(); ys.value=state.currentYear;

function renderMonthly() {
  initMonthlySelects();
  renderLegend('monthly-legend');

  const y=parseInt(document.getElementById('year-select-monthly').value);
  const days=daysInMonth(y,m), first=firstDayOfMonth(y,m);
  let html=`<div class="monthly-header">`;
  DAYS_SHORT.forEach(d=>html+=`<div>${d}</div>`);
  html+=`</div><div class="monthly-grid">`;
  for(let i=0;i<first;i++) html+=`<div class="monthly-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const key=dateKey(y,m,d), marks=getDayMarks(key), festivo=isFestivo(key);
    const weekend=isWeekend(y,m,d), isToday=key===todayKey();
    let cls='monthly-day';
    if(weekend) cls+=' weekend';
    if(isToday) cls+=' today';
    if(festivo) cls+=' is-festivo';
    const festivoHtml=festivo?`<div class="festivo-label">🎌 Festivo</div>`:'';
    const badges=Object.entries(marks).map(([id,type])=>{
      const emp=state.employees.find(e=>e.id===Number(id));
      if(!emp) return '';
      return `<span class="emp-badge" style="background:${emp.color}">${emp.name}${type==='O'?' ✱':''}</span>`;

  document.getElementById('day-modal-title').textContent=`📅 ${parseInt(p[2])} de ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;

  document.getElementById('festivo-toggle').classList.toggle('active',festivo);

      <input type="checkbox" id="chk-${emp.id}" ${marked?'checked':''} onclick="event.stopPropagation();toggleDayRow(${emp.id})">
      <div class="emp-dot-sm" style="background:${emp.color}"></div>
      <span style="font-size:.83rem;font-weight:600">${emp.name}</span>
      <select class="day-emp-type" id="type-${emp.id}" onclick="event.stopPropagation()">
        <option value="V" ${type==='V'?'selected':''}>Vacaciones</option>
        <option value="O" ${type==='O'?'selected':''}>Otros</option>
      </select>

function toggleFestivo() {
  const chk=document.getElementById('chk-festivo');
  chk.checked=!chk.checked;
  document.getElementById('festivo-toggle').classList.toggle('active',chk.checked);
}

function toggleDayRow(empId) {
  const chk=document.getElementById('chk-'+empId), row=document.getElementById('row-'+empId);
  chk.checked=!chk.checked;
  row.classList.toggle('selected',chk.checked);
}

function saveDayMarks() {
  // Festivo: completely separate from employees
  if(document.getElementById('chk-festivo').checked) state.festivos[currentDayKey]=true;
  else delete state.festivos[currentDayKey];
  // Employee marks
  const marks={};
  state.employees.forEach(emp=>{
    const chk=document.getElementById('chk-'+emp.id);
    const type=document.getElementById('type-'+emp.id).value;
    if(chk&&chk.checked) marks[emp.id]=type;
  });
  if(Object.keys(marks).length) state.marks[currentDayKey]=marks;
  else delete state.marks[currentDayKey];
  saveState();
  closeModal('day-modal');
  showToast('✅ Guardado');
  const idx=[...document.querySelectorAll('.tab-btn')].findIndex(b=>b.classList.contains('active'));
  showView(['dashboard','annual','monthly'][idx]);
}

let editingEmpId=null;

function buildColorPicker(sel) {
  return COLORS.map(c=>`<div class="color-opt ${c===sel?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}
function selectColor(c) {
  state.selectedColor=c;
  document.querySelectorAll('.color-opt').forEach(el=>el.classList.toggle('selected',el.style.background===c||el.style.backgroundColor===c));
}
function openAddEmployee() {
  editingEmpId=null;
  document.getElementById('emp-modal-title').textContent='Nuevo Empleado';
  document.getElementById('emp-name').value='';
  document.getElementById('emp-role').value='';
  document.getElementById('emp-days').value='28';
  state.selectedColor=COLORS[state.employees.length%COLORS.length];
  document.getElementById('color-picker').innerHTML=buildColorPicker(state.selectedColor);
  openModal('emp-modal');
}
function openEditEmployee(id) {
  const emp=state.employees.find(e=>e.id===id);
  if(!emp) return;
  editingEmpId=id;
  document.getElementById('emp-modal-title').textContent='Editar Empleado';
  document.getElementById('emp-name').value=emp.name;
  document.getElementById('emp-role').value=emp.role||'';
  document.getElementById('emp-days').value=emp.totalDays;
  state.selectedColor=emp.color;
  document.getElementById('color-picker').innerHTML=buildColorPicker(emp.color);
  openModal('emp-modal');
}
function saveEmployee() {
  const name=document.getElementById('emp-name').value.trim();
  const role=document.getElementById('emp-role').value.trim();
  const days=parseInt(document.getElementById('emp-days').value)||28;
  if(!name){ showToast('❌ El nombre es obligatorio'); return; }
  if(editingEmpId){
    const emp=state.employees.find(e=>e.id===editingEmpId);
    if(emp){ emp.name=name; emp.role=role; emp.totalDays=days; emp.color=state.selectedColor; }
  } else {
    state.employees.push({id:state.nextId++,name,role,color:state.selectedColor,totalDays:days});
  }
  saveState(); closeModal('emp-modal');
  showToast(editingEmpId?'✅ Empleado actualizado':'✅ Empleado añadido');
  renderDashboard();
}
function deleteEmployee(id) {
  if(!confirm('¿Eliminar este empleado? Se borrarán sus días marcados.')) return;
  state.employees=state.employees.filter(e=>e.id!==id);
  for(const key of Object.keys(state.marks)){
    delete state.marks[key][id];
    if(!Object.keys(state.marks[key]).length) delete state.marks[key];
  }
  saveState(); showToast('🗑 Empleado eliminado'); renderDashboard();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function generatePDF() {
  const btn = document.getElementById('pdf-generate-btn');
  btn.textContent = 'Generando...'; btn.disabled = true;

  const empVal = document.getElementById('pdf-emp-select').value;
  const year   = parseInt(document.getElementById('pdf-year-select').value);

  // Build list of employees to show
  const empsToShow = empVal === 'all'
    ? state.employees
    : state.employees.filter(e => e.id === parseInt(empVal));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const PW = 297, PH = 210;
  const MARGIN = 10;
  const COL_GAP = 5, ROW_GAP = 5;
  const COLS = 4, ROWS = 3;
  const cellW = (PW - MARGIN*2 - COL_GAP*(COLS-1)) / COLS;
  const cellH = (PH - MARGIN*2 - ROW_GAP*(ROWS-1) - 22) / ROWS; // 22 for header

  // ── Page header ──
  doc.setFillColor(15,15,19);
  doc.rect(0,0,PW,PH,'F');

  // Title bar
  doc.setFillColor(26,26,34);
  doc.roundedRect(MARGIN, MARGIN, PW-MARGIN*2, 14, 2, 2, 'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.setTextColor(245,166,35);
  doc.text(`Control de Vacaciones ${year}`, MARGIN+5, MARGIN+9);

  // Subtitle: employee name(s)
  doc.setFontSize(8);
  doc.setTextColor(160,160,190);
  const empLabel = empVal === 'all' ? 'Todos los empleados' : empsToShow[0]?.name;
  doc.text(empLabel, PW - MARGIN - 5, MARGIN+9, {align:'right'});

  // ── Legend row (color dots) ──
  if (empsToShow.length > 1) {
    let lx = MARGIN + 5;
    const ly = MARGIN + 17;
    empsToShow.forEach(emp => {
      const [r,g,b] = hexToRgb(emp.color);
      doc.setFillColor(r,g,b);
      doc.circle(lx+1.5, ly, 1.5, 'F');
      doc.setTextColor(220,220,230);
      doc.setFontSize(6.5);
      doc.text(emp.name, lx+4.5, ly+0.8);
      lx += doc.getTextWidth(emp.name) + 10;
    });
  }

  const calendarTop = empsToShow.length > 1 ? MARGIN + 22 : MARGIN + 20;
  const calCellH = (PH - calendarTop - MARGIN) / ROWS - ROW_GAP * (ROWS-1)/ROWS;

  // ── Draw 12 months ──
  for (let m = 0; m < 12; m++) {
    const col = m % COLS;
    const row = Math.floor(m / COLS);
    const mx = MARGIN + col * (cellW + COL_GAP);
    const my = calendarTop + row * (calCellH + ROW_GAP);

    // Month background
    doc.setFillColor(26,26,34);
    doc.roundedRect(mx, my, cellW, calCellH, 2, 2, 'F');

    // Month name
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor(112,112,160);
    doc.text(MONTHS[m].toUpperCase(), mx+3, my+5.5);

    // Day headers L M X J V S D
    const dayNames = ['L','M','X','J','V','S','D'];
    const dayCellW = (cellW - 6) / 7;
    const dayCellH = (calCellH - 10) / 7;
    const headerY = my + 8;
    dayNames.forEach((dn, i) => {
      doc.setFont('helvetica','bold');
      doc.setFontSize(5);
      doc.setTextColor(90,90,120);
      doc.text(dn, mx + 3 + i * dayCellW + dayCellW/2, headerY, {align:'center'});
    });

    // Days
    const days = daysInMonth(year, m);
    const first = firstDayOfMonth(year, m);
    let dayX, dayY;
    for (let d = 1; d <= days; d++) {
      const pos = first + d - 1;
      const dcol = pos % 7;
      const drow = Math.floor(pos / 7);
      dayX = mx + 3 + dcol * dayCellW;
      dayY = headerY + 3.5 + drow * dayCellH;
      const key = dateKey(year, m, d);
      const marks = getDayMarks(key);
      const festivo = isFestivo(key);
      const weekend = isWeekend(year, m, d);

      // Collect vacation marks for selected employees
      const vacEmps = empsToShow.filter(emp => marks[emp.id] === 'V');

      if (festivo) {
        // Festivo: light red tint
        doc.setFillColor(255,107,107,0.15);
        doc.setFillColor(60,20,20);
        doc.roundedRect(dayX, dayY, dayCellW-0.5, dayCellH-0.5, 0.5, 0.5, 'F');
      } else if (vacEmps.length === 1) {
        // Single employee: solid color
        const [r,g,b] = hexToRgb(vacEmps[0].color);
        doc.setFillColor(r,g,b);
        doc.roundedRect(dayX, dayY, dayCellW-0.5, dayCellH-0.5, 0.5, 0.5, 'F');
      } else if (vacEmps.length > 1) {
        // Multiple: split cell with each color
        const sliceW = (dayCellW-0.5) / vacEmps.length;
        vacEmps.forEach((emp, i) => {
          const [r,g,b] = hexToRgb(emp.color);
          doc.setFillColor(r,g,b);
          doc.rect(dayX + i*sliceW, dayY, sliceW, dayCellH-0.5, 'F');
        });
      }

      // Day number
      const isToday = key === todayKey();
      if (weekend) doc.setTextColor(80,80,110);
      else if (vacEmps.length > 0) doc.setTextColor(255,255,255);
      else doc.setTextColor(180,180,200);
      doc.setFont('helvetica', isToday ? 'bold' : 'normal');
      doc.setFontSize(5.2);
      doc.text(String(d), dayX + dayCellW/2, dayY + dayCellH*0.68, {align:'center'});
    }
  }

  // ── Summary box ──
  if (empsToShow.length === 1) {
    const emp = empsToShow[0];
    const used = countVacDays(emp.id, year);
    const remaining = emp.totalDays - used;
    const [r,g,b] = hexToRgb(emp.color);
    // Bottom right corner summary
    const sx = PW - MARGIN - 48, sy = PH - MARGIN - 18;
    doc.setFillColor(26,26,34);
    doc.roundedRect(sx, sy, 48, 18, 2, 2, 'F');
    doc.setDrawColor(r,g,b);
    doc.setLineWidth(0.4);
    doc.roundedRect(sx, sy, 48, 18, 2, 2, 'S');
    doc.setFillColor(r,g,b);
    doc.roundedRect(sx, sy, 3, 18, 2, 2, 'F');
    doc.rect(sx, sy, 1.5, 18, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(7);
    doc.setTextColor(r,g,b);
    doc.text(emp.name, sx+6, sy+5.5);
    doc.setTextColor(200,200,220);
    doc.setFontSize(6);
    doc.text(`Días usados: ${used} / ${emp.totalDays}`, sx+6, sy+10.5);
    doc.text(`Restantes: ${remaining}`, sx+6, sy+15);
  }

  // ── Footer ──
  doc.setFont('helvetica','normal');
  doc.setFontSize(5.5);
  doc.setTextColor(60,60,80);
  doc.text(`Generado el ${new Date().toLocaleDateString('es-ES')}`, MARGIN, PH-3);

  const filename = empVal === 'all'
    ? `vacaciones_todos_${year}.pdf`
    : `vacaciones_${empsToShow[0]?.name.toLowerCase()}_${year}.pdf`;
  doc.save(filename);

  btn.textContent = 'Generar PDF'; btn.disabled = false;
  closeModal('pdf-modal');
  showToast('✅ PDF descargado');
}


initMonthlySelects();
renderDashboard();
</script>
</body>
</html>
